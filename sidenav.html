<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8">
    <title> Side Navigation Bar | CodingLab </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
       
     <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}
.wrapper{
  height: 100%;
  width: 300px;
  position: relative;
}
#sidebar{
  position: fixed;
  background: #111;
  height: 100%;
  width: 270px;
  left: -270px; /* Hidden by default */
  transition: all 0.3s ease;
}
#btn:checked ~ #sidebar{
  left: 0;
}
#sidebar .title{
  font-size: 25px;
  font-weight: 600;
  line-height: 65px;
  text-align: center;
  background: #333;
  color: #fff;
  letter-spacing: 1px;
}
#sidebar .list-items{
  width: 100%;
  list-style: none;
}
#sidebar .list-items li{
  line-height: 50px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
#sidebar .list-items li:last-child{
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
#sidebar .list-items li a{
  color: #f2f2f2;
  text-decoration: none;
  font-size: 18px;
  font-weight: 500;
  padding-left: 40px;
  display: block;
  width: 100%;
  transition: all 0.3s ease;
}
#sidebar .list-items li a:hover{
  background: #fff;
  color: #111;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}
#sidebar .list-items li a i{
  margin-right: 20px;
}
.menu-btn{
  position: absolute;
  top: 20px;
  left: 20px;
  height: 45px;
  width: 45px;
  background: #111;
  color: #fff;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.3s ease;
}
#btn:checked ~ .menu-btn{
  left: 247px;
}
.menu-btn i{
  transition: all 0.3s ease;
}
#btn:checked ~ .menu-btn i{
  transform: rotate(90deg);
}
#sidebar .icons{
  width: 100%;
  display: flex;
  justify-content: center;
  position: absolute;
  bottom: 40px;
}
#sidebar .icons a{
  height: 40px;
  width: 40px;
  background: #333;
  margin: 0 5px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f2f2f2;
  text-decoration: none;
  transition: all 0.3s ease;
}
#sidebar .icons a:hover{
  background: #fff;
  color: #111;
}
     </style>
   
    </head>
<body>
  <div class="wrapper">
    <input type="checkbox" id="btn" hidden>
    <label for="btn" class="menu-btn">
      <i class="fas fa-bars"></i>
    </label>
    <nav id="sidebar">
      <div class="title">Side Menu</div>
      <ul class="list-items">
        <li><a href="#"><i class="fas fa-home"></i>Home</a></li>
        <li><a href="#"><i class="fas fa-sliders-h"></i>Clients</a></li>
        <li><a href="#"><i class="fas fa-address-book"></i>Services</a></li>
        <li><a href="#"><i class="fas fa-cog"></i>Settings</a></li>
        <li><a href="#"><i class="fas fa-stream"></i>Features</a></li>
        <li><a href="#"><i class="fas fa-user"></i>About us</a></li>
        <li><a href="#"><i class="fas fa-envelope"></i>Contact us</a></li>
        <div class="icons">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-github"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
      </ul>
    </nav>
  </div>
</body>
</html>
